version: '3.9'
services:
  backend:
    build:
      context: ./backend/HanoiTourism.Api
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend/hanoi-tourism-web
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend
